name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      channel:
        description: 'Update channel for electron-updater metadata.'
        required: false
        default: 'latest'

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: '22.22.2'

jobs:
  prepare:
    name: Prepare release metadata
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.release.outputs.version }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      channel: ${{ steps.release.outputs.channel }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release metadata
        id: release
        shell: bash
        env:
          INPUT_CHANNEL: ${{ github.event.inputs.channel }}
        run: |
          set -euo pipefail

          package_version="$(node -p "require('./package.json').version")"
          channel="${INPUT_CHANNEL:-latest}"

          if [[ ! "${channel}" =~ ^[0-9A-Za-z._-]+$ ]]; then
            echo "Release channel may only contain letters, numbers, dots, underscores, and hyphens. Got ${channel}." >&2
            exit 1
          fi

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            tag_name="${GITHUB_REF_NAME}"
            if [[ ! "${tag_name}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([-.+][0-9A-Za-z.-]+)?$ ]]; then
              echo "Release tags must use v<package-version>, got ${tag_name}." >&2
              exit 1
            fi

            tag_version="${tag_name#v}"
            if [[ "${tag_version}" != "${package_version}" ]]; then
              echo "Tag version ${tag_version} does not match package.json version ${package_version}." >&2
              exit 1
            fi
          else
            tag_name="v${package_version}"
          fi

          echo "version=${package_version}" >> "${GITHUB_OUTPUT}"
          echo "tag_name=${tag_name}" >> "${GITHUB_OUTPUT}"
          echo "channel=${channel}" >> "${GITHUB_OUTPUT}"

  build-mac:
    name: Build macOS arm64
    runs-on: macos-15
    needs: prepare
    env:
      SKILLPKG_UPDATE_CHANNEL: ${{ needs.prepare.outputs.channel }}
      CSC_LINK: ${{ secrets.CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_ID_PASS }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate Apple notarization credentials
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${APPLE_ID}" || -z "${APPLE_APP_SPECIFIC_PASSWORD}" || -z "${APPLE_TEAM_ID}" ]]; then
            echo "APPLE_ID, APPLE_ID_PASS, and APPLE_TEAM_ID are required for macOS notarization." >&2
            exit 1
          fi

      - name: Build signed and notarized macOS package for direct distribution
        run: node scripts/package.js --platform mac --sign --publish never -- --arm64

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-mac
          if-no-files-found: error
          retention-days: 14
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*.blockmap
            dist/*.yml

  build-linux:
    name: Build Linux x64
    runs-on: ubuntu-latest
    needs: prepare
    env:
      SKILLPKG_UPDATE_CHANNEL: ${{ needs.prepare.outputs.channel }}
      LINUX_GPG_KEY_ID: ${{ secrets.LINUX_GPG_KEY_ID }}
      LINUX_GPG_PASSPHRASE: ${{ secrets.LINUX_GPG_PASSPHRASE }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Import Linux GPG signing key
        shell: bash
        env:
          LINUX_GPG_PRIVATE_KEY_BASE64: ${{ secrets.LINUX_GPG_PRIVATE_KEY_BASE64 }}
        run: |
          set -euo pipefail
          if [[ -z "${LINUX_GPG_PRIVATE_KEY_BASE64}" ]]; then
            echo "LINUX_GPG_PRIVATE_KEY_BASE64 is required for Linux signing." >&2
            exit 1
          fi

          key_path="${RUNNER_TEMP}/linux-signing-key.asc"
          echo "${LINUX_GPG_PRIVATE_KEY_BASE64}" | base64 --decode > "${key_path}"
          gpg --batch --import "${key_path}"

      - name: Build signed Linux package
        run: node scripts/package.js --platform linux --sign --publish never -- --x64

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-linux
          if-no-files-found: error
          retention-days: 14
          path: |
            dist/*.AppImage
            dist/*.deb
            dist/*.blockmap
            dist/*.sig
            dist/*.sha256
            dist/*.yml

  build-windows:
    name: Build Windows x64
    runs-on: windows-latest
    needs: prepare
    env:
      SKILLPKG_UPDATE_CHANNEL: ${{ needs.prepare.outputs.channel }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build unsigned Windows package
        run: node scripts/package.js --platform win --publish never -- --x64

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-windows
          if-no-files-found: error
          retention-days: 14
          path: |
            dist/*.exe
            dist/*.blockmap
            dist/*.yml

  publish-github-release:
    name: Publish artifacts to GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    needs:
      - prepare
      - build-mac
      - build-linux
      - build-windows
    env:
      GH_TOKEN: ${{ github.token }}
      GH_REPO: ${{ github.repository }}
      RELEASE_TAG: ${{ needs.prepare.outputs.tag_name }}
      RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
      RELEASE_TARGET: ${{ github.sha }}
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: dist-*
          path: release-artifacts
          merge-multiple: true

      - name: Show release artifact list
        shell: bash
        run: find release-artifacts -maxdepth 1 -type f -print | sort

      - name: Create or update GitHub Release
        shell: bash
        run: |
          set -euo pipefail
          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            echo "GitHub Release ${RELEASE_TAG} already exists."
          else
            gh release create "${RELEASE_TAG}" \
              --title "SkillPKG Studio ${RELEASE_VERSION}" \
              --target "${RELEASE_TARGET}" \
              --notes "SkillPKG Studio ${RELEASE_VERSION}"
          fi

          gh release upload "${RELEASE_TAG}" release-artifacts/* --clobber
