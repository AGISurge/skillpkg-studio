name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      channel:
        description: 'Update channel and COS feed directory.'
        required: false
        default: 'latest'

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: '22.22.2'
  DEFAULT_UPDATE_SERVER_URL: 'https://oss.skillpkg.com/studio'

jobs:
  prepare:
    name: Prepare release metadata
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.release.outputs.version }}
      channel: ${{ steps.release.outputs.channel }}
      cos_prefix: ${{ steps.release.outputs.cos_prefix }}
      update_server_url: ${{ steps.release.outputs.update_server_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release metadata
        id: release
        shell: bash
        env:
          INPUT_CHANNEL: ${{ github.event.inputs.channel }}
          COS_PREFIX_VAR: ${{ vars.TENCENT_COS_REMOTE_PREFIX }}
          UPDATE_SERVER_URL_VAR: ${{ vars.SKILLPKG_UPDATE_SERVER_URL }}
        run: |
          set -euo pipefail

          package_version="$(node -p "require('./package.json').version")"
          channel="${INPUT_CHANNEL:-latest}"
          cos_prefix="${COS_PREFIX_VAR:-skillpkg-studio}"
          update_server_base_url="${UPDATE_SERVER_URL_VAR:-$DEFAULT_UPDATE_SERVER_URL}"

          if [[ ! "${channel}" =~ ^[0-9A-Za-z._-]+$ ]]; then
            echo "Release channel may only contain letters, numbers, dots, underscores, and hyphens. Got ${channel}." >&2
            exit 1
          fi

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            tag_name="${GITHUB_REF_NAME}"
            if [[ ! "${tag_name}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([-.+][0-9A-Za-z.-]+)?$ ]]; then
              echo "Release tags must use v<package-version>, got ${tag_name}." >&2
              exit 1
            fi

            tag_version="${tag_name#v}"
            if [[ "${tag_version}" != "${package_version}" ]]; then
              echo "Tag version ${tag_version} does not match package.json version ${package_version}." >&2
              exit 1
            fi
          fi

          cos_prefix="${cos_prefix#/}"
          cos_prefix="${cos_prefix%/}"
          update_server_base_url="${update_server_base_url%/}"
          update_server_url="${update_server_base_url}/${channel}"

          echo "version=${package_version}" >> "${GITHUB_OUTPUT}"
          echo "channel=${channel}" >> "${GITHUB_OUTPUT}"
          echo "cos_prefix=${cos_prefix}" >> "${GITHUB_OUTPUT}"
          echo "update_server_url=${update_server_url}" >> "${GITHUB_OUTPUT}"

  build-mac:
    name: Build macOS arm64
    runs-on: macos-15
    needs: prepare
    env:
      SKILLPKG_UPDATE_CHANNEL: ${{ needs.prepare.outputs.channel }}
      SKILLPKG_UPDATE_SERVER_URL: ${{ needs.prepare.outputs.update_server_url }}
      CSC_LINK: ${{ secrets.CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_ID_PASS }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate Apple notarization credentials
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${APPLE_ID}" || -z "${APPLE_APP_SPECIFIC_PASSWORD}" || -z "${APPLE_TEAM_ID}" ]]; then
            echo "APPLE_ID, APPLE_ID_PASS, and APPLE_TEAM_ID are required for macOS notarization." >&2
            exit 1
          fi

      - name: Build signed and notarized macOS package for direct distribution
        run: node scripts/package.js --platform mac --sign --publish always -- --arm64

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-mac
          if-no-files-found: error
          retention-days: 14
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*.blockmap
            dist/*mac*.yml

  build-linux:
    name: Build Linux x64
    runs-on: ubuntu-latest
    needs: prepare
    env:
      SKILLPKG_UPDATE_CHANNEL: ${{ needs.prepare.outputs.channel }}
      SKILLPKG_UPDATE_SERVER_URL: ${{ needs.prepare.outputs.update_server_url }}
      LINUX_GPG_KEY_ID: ${{ secrets.LINUX_GPG_KEY_ID }}
      LINUX_GPG_PASSPHRASE: ${{ secrets.LINUX_GPG_PASSPHRASE }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Import Linux GPG signing key
        shell: bash
        env:
          LINUX_GPG_PRIVATE_KEY_BASE64: ${{ secrets.LINUX_GPG_PRIVATE_KEY_BASE64 }}
        run: |
          set -euo pipefail
          if [[ -z "${LINUX_GPG_PRIVATE_KEY_BASE64}" ]]; then
            echo "LINUX_GPG_PRIVATE_KEY_BASE64 is required for Linux signing." >&2
            exit 1
          fi

          key_path="${RUNNER_TEMP}/linux-signing-key.asc"
          echo "${LINUX_GPG_PRIVATE_KEY_BASE64}" | base64 --decode > "${key_path}"
          gpg --batch --import "${key_path}"

      - name: Build signed Linux package
        run: node scripts/package.js --platform linux --sign --publish always -- --x64

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-linux
          if-no-files-found: error
          retention-days: 14
          path: |
            dist/*.AppImage
            dist/*.deb
            dist/*.blockmap
            dist/*.sig
            dist/*.sha256
            dist/*linux*.yml

  build-windows:
    name: Build Windows x64
    runs-on: windows-latest
    needs: prepare
    env:
      SKILLPKG_UPDATE_CHANNEL: ${{ needs.prepare.outputs.channel }}
      SKILLPKG_UPDATE_SERVER_URL: ${{ needs.prepare.outputs.update_server_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build unsigned Windows package
        run: node scripts/package.js --platform win --publish always -- --x64

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-windows
          if-no-files-found: error
          retention-days: 14
          path: |
            dist/*.exe
            dist/*.blockmap
            dist/latest*.yml

  publish-cos:
    name: Publish artifacts to Tencent Cloud COS
    runs-on: ubuntu-latest
    needs:
      - prepare
      - build-mac
      - build-linux
      - build-windows
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: dist-*
          path: release-artifacts
          merge-multiple: true

      - name: Show release artifact list
        shell: bash
        run: find release-artifacts -maxdepth 1 -type f -print | sort

      - name: Install COSCLI
        shell: bash
        run: |
          set -euo pipefail
          curl -L "https://cosbrowser.cloud.tencent.com/software/coscli/coscli-linux-amd64" -o coscli
          chmod 755 coscli
          ./coscli --version

      - name: Publish current channel feed
        shell: bash
        env:
          TENCENT_COS_SECRET_ID: ${{ secrets.TENCENT_COS_SECRET_ID }}
          TENCENT_COS_SECRET_KEY: ${{ secrets.TENCENT_COS_SECRET_KEY }}
          TENCENT_COS_BUCKET: ${{ secrets.TENCENT_COS_BUCKET }}
          TENCENT_COS_REGION: ${{ secrets.TENCENT_COS_REGION }}
          REMOTE_PATH: ${{ needs.prepare.outputs.cos_prefix }}/${{ needs.prepare.outputs.channel }}
        run: |
          set -euo pipefail
          endpoint="cos.${TENCENT_COS_REGION}.myqcloud.com"
          ./coscli sync release-artifacts/ "cos://${TENCENT_COS_BUCKET}/${REMOTE_PATH}/" \
            -r \
            --delete \
            --force \
            -e "${endpoint}" \
            -i "${TENCENT_COS_SECRET_ID}" \
            -k "${TENCENT_COS_SECRET_KEY}"

      - name: Publish immutable release archive
        shell: bash
        env:
          TENCENT_COS_SECRET_ID: ${{ secrets.TENCENT_COS_SECRET_ID }}
          TENCENT_COS_SECRET_KEY: ${{ secrets.TENCENT_COS_SECRET_KEY }}
          TENCENT_COS_BUCKET: ${{ secrets.TENCENT_COS_BUCKET }}
          TENCENT_COS_REGION: ${{ secrets.TENCENT_COS_REGION }}
          REMOTE_PATH: ${{ needs.prepare.outputs.cos_prefix }}/releases/v${{ needs.prepare.outputs.version }}
        run: |
          set -euo pipefail
          endpoint="cos.${TENCENT_COS_REGION}.myqcloud.com"
          ./coscli sync release-artifacts/ "cos://${TENCENT_COS_BUCKET}/${REMOTE_PATH}/" \
            -r \
            --force \
            -e "${endpoint}" \
            -i "${TENCENT_COS_SECRET_ID}" \
            -k "${TENCENT_COS_SECRET_KEY}"
